name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          go mod download
          cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build backend
        run: go build -o sentinelmesh .

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
